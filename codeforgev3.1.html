<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeForge AI | Pro Edition</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #7289da; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; }
        #chat-history { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .chat-msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; background: #2a2a2a; }
        .editor-container { flex: 1; display: flex; flex-direction: column; padding: 10px; }
        textarea { flex: 1; background: #000; color: #00ff00; font-family: 'Consolas', monospace; padding: 15px; border: 1px solid #444; border-radius: 5px; resize: none; outline: none; }
        .preview-container { flex: 1; background: #fff; border-left: 1px solid #333; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { padding: 10px; display: flex; gap: 10px; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: var(--accent); color: white; }
        input[type="text"] { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <strong>CODEFORGE AI</strong>
    <div>
        <label>Gemini Key: </label>
        <input type="password" id="api-key" placeholder="Enter Key..." oninput="saveKey()">
    </div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div id="chat-history"></div>
        <div class="controls" style="flex-direction:column">
            <input type="text" id="chat-input" placeholder="Ask Aetheris to code...">
            <button onclick="askAI()" style="margin-top:5px">Send Request</button>
        </div>
    </div>

    <div class="editor-container">
        <div style="margin-bottom: 5px; display:flex; justify-content: space-between;">
            <span>index.html</span>
            <button onclick="runCode()" style="background: #2ecc71;">▶ Run Logic</button>
        </div>
        <textarea id="code-editor"></textarea>
    </div>

    <div class="preview-container">
        <iframe id="sandbox"></iframe>
    </div>
</div>

<script>
    // 1. Load Data on Startup
    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('gemini_key') || "";
        document.getElementById('code-editor').value = localStorage.getItem('saved_code') || "";
        if(localStorage.getItem('saved_code')) runCode();
    };

    function saveKey() {
        localStorage.setItem('gemini_key', document.getElementById('api-key').value);
    }

    function runCode() {
        const code = document.getElementById('code-editor').value;
        localStorage.setItem('saved_code', code);
        const blob = new Blob([code], { type: 'text/html' });
        document.getElementById('sandbox').src = URL.createObjectURL(blob);
    }

    async function askAI() {
        const key = document.getElementById('api-key').value;
        const prompt = document.getElementById('chat-input').value;
        const history = document.getElementById('chat-history');

        if(!key) return alert("Please enter your API Key first!");

        history.innerHTML += `<div class="chat-msg"><b>You:</b> ${prompt}</div>`;
        document.getElementById('chat-input').value = "";

        try {
           const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Respond ONLY with the full updated HTML code. No talk. Fix/Change: " + prompt + " Current code: " + document.getElementById('code-editor').value }] }]
                })
            });

            const data = await response.json();
            const aiCode = data.candidates[0].content.parts[0].text.replace(/```html|```/g, "");
            
            document.getElementById('code-editor').value = aiCode.trim();
            history.innerHTML += `<div class="chat-msg" style="background:#333"><b>Aetheris:</b> Code updated! Click Run Logic.</div>`;
            runCode();
        } catch (e) {
            history.innerHTML += `<div class="chat-msg" style="color:red">Error. Check key or connection.</div>`;
        }
    }
</script>

</body>
</html>
